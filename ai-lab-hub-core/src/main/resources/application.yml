server:
  port: 8080
  servlet:
    context-path: /ai-lab-hub-api

spring:
  application:
    name: ai-lab-hub
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/ai_lab_hub?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: ${MYSQL_PASSWORD:liuaobo} # 支持环境变量注入，本地开发密码默认为 liuaobo
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none # 我们使用 schema.sql 静态建表以精准控制类型与字符集
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  sql:
    init:
      mode: always # 启动时自动执行初始化建表和数据插入
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

# 大模型静态兜底与配置
ai:
  global:
    api-key: ${AI_GLOBAL_API_KEY:sk-default-key-for-hub}
    endpoint: ${AI_GLOBAL_ENDPOINT:https://api.anthropic.com}
    model: ${AI_GLOBAL_MODEL:claude-3-5-sonnet}
  file:
    temp-dir: ${AI_TEMP_DIR:./temp}
